; LapTimerBLE transponder firmware (Seeed XIAO ESP32-C3).
;
; One environment per car. Each sets CAR_NUMBER via a build flag; the firmware
; uses that to pick its BLE local name (LapTimer-N) and advertising interval
; from the table in plan.md.
;
; Build / flash a specific car:
;     pio run -e car1 -t upload
;
; Watch serial output:
;     pio device monitor -e car1

[platformio]
default_envs = car1

[env]
platform = espressif32@6.5.0
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
; Route Arduino `Serial` to the ESP32-C3's hardware USB-Serial/JTAG endpoint so
; printf output reaches `pio device monitor`. Without these, `Serial` goes to
; UART0 on GPIO21/20 which is not exposed over USB.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps = h2zero/NimBLE-Arduino@^1.4.2

[env:car1]
build_flags = ${env.build_flags} -DCAR_NUMBER=1

[env:car2]
build_flags = ${env.build_flags} -DCAR_NUMBER=2

[env:car3]
build_flags = ${env.build_flags} -DCAR_NUMBER=3

[env:car4]
build_flags = ${env.build_flags} -DCAR_NUMBER=4

[env:car5]
build_flags = ${env.build_flags} -DCAR_NUMBER=5

[env:car6]
build_flags = ${env.build_flags} -DCAR_NUMBER=6

[env:car7]
build_flags = ${env.build_flags} -DCAR_NUMBER=7

[env:car8]
build_flags = ${env.build_flags} -DCAR_NUMBER=8
